name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Restore backend
        run: dotnet restore backend/RepoFluent.sln

      - name: Build backend
        run: dotnet build backend/RepoFluent.sln --no-restore

      - name: Test backend
        run: dotnet test backend/RepoFluent.sln --no-build

      - name: Restore frontend
        working-directory: frontend
        run: npm ci

      - name: Check frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Check frontend formatting
        working-directory: frontend
        run: npm run format:check

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Test frontend
        working-directory: frontend
        run: npm test

      - name: Install acceptance browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run live-stack acceptance test
        working-directory: frontend
        run: npm run e2e

      - name: Restore design-system QA tools
        working-directory: desigh-system
        run: npm install --no-package-lock

      - name: Validate design-system HTML
        working-directory: desigh-system
        run: npm run validate

      - name: Smoke-test design-system documentation
        working-directory: desigh-system
        run: npm test

      - name: Validate detailed designs
        run: python eng/verify_detailed_designs.py
